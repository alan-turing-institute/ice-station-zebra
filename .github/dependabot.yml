---

version: 2
updates:
  # GitHub Action update PRs
  - package-ecosystem: "github-actions"
    directory: "/"  # This will update .github/workflows/
    schedule:
      interval: "weekly"
  # Python package update PRs
  - package-ecosystem: pip  # This will update 'pyproject.toml'
    directory: "/"
    schedule:
      interval: "weekly"
