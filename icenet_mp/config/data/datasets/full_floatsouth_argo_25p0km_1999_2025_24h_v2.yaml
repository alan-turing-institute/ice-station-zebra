  input:
    pipe:
      # Get the ARGO data
      - argo:
          area: "0/-180/-90/180"  # southern hemisphere
          crs: "EPSG:6932"
          param:
            - TEMP # temperature
            - PSAL # salinity
          resolution: "25p0km"
          shape: [432, 432]
      # Replace NaNs with a fill value
      - nan_to_num:
          variables: [TEMP, PSAL]
          replace_with: 99
      # Set the geography to EASE2 25km grid
      - set_geography:
          crs: ${...0.argo.crs}
          resolution: ${...0.argo.resolution}
