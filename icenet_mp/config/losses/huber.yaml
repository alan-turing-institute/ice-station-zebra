# @package model.loss

# =============================================================================
# Huber Loss
# =============================================================================
# Reference: https://pytorch.org/docs/stable/generated/torch.nn.HuberLoss.html
#
# A robust regression loss that combines MSE and MAE:
#   - Quadratic (MSE-like) for small errors  → smooth gradient near zero
#   - Linear (MAE-like) for large errors     → robust to outliers
#
# Formula:
#                   | 0.5 * e²                      if |e| <= delta
#   L(y, ŷ)     =   |
#                   | delta * (|e| - 0.5 * delta)   if |e| > delta
#
#   where e     = y - ŷ (residual)
#         delta = threshold controlling the quadratic→linear transition
#
# Parameters:
#   delta : float
#     - Smaller delta → transition sooner, more MAE-like (more robust to outliers)
#     - Larger delta  → transition later,  more MSE-like (smoother near zero)
#     - PyTorch default: 1.0
#
# When to use:
#   - Regression where outliers would otherwise dominate an MSE loss
#   - When you want the loss value to stay in the same units as the target
# =============================================================================

_target_: torch.nn.HuberLoss
delta: 0.5  #0.0 to 1.0