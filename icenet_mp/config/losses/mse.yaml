# @package model.loss

# =============================================================================
# MSE Loss (Mean Squared Error, a.k.a. L2 Loss)
# =============================================================================
# Reference: https://pytorch.org/docs/stable/generated/torch.nn.MSELoss.html
#
# The classic regression loss: the squared residual.
#   - Smooth everywhere (differentiable at e = 0, unlike L1)
#   - Gradient scales with the error: big errors get big pushes
#   - Sensitive to outliers — one large residual dominates the loss
#
# Formula:
#   L(y, ŷ) = e²          where  e = y - ŷ  (residual)
#
# Gradient:
#   dL/de = 2 * e         (linear in the error, not constant like L1)
#
# Parameters:
#   (none — MSELoss has no shape or threshold parameters; only `reduction`)
#
# When to use:
#   - Regression with roughly Gaussian noise and few outliers
#   - Default choice in deep learning: smooth, everywhere-differentiable
#     gradients play well with SGD/Adam and converge cleanly near the optimum
#     (no L1-style jitter at zero)
#   - Encourages mean-like predictions (vs. L1 which encourages the median)
#
# When NOT to use:
#   - Data with outliers or heavy-tailed noise, squared error lets a single
#     bad point dominate training. Use HuberLoss, SmoothL1Loss, or L1Loss
#     instead, which cap how much one large residual can contribute.
# =============================================================================

_target_: torch.nn.MSELoss
